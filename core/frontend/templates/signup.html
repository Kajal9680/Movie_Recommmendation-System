<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MOVIXPedia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <a href="/" style="text-decoration:none"><span class="logo">MOVIX<span>Pedia</span></span></a>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('main.home') }}">Home</a>
            </nav>
            <div class="actions">
                <a href="{{ url_for('auth.login') }}" class="login-link">Log In</a>
            </div>
        </header>

        <main class="auth-page">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">🎬</div>
                    <h1>Create Account</h1>
                    <p>Join MOVIXPedia and discover amazing movies</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password"
                            placeholder="Create a password (min 6 chars)" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Sign Up</button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log In</a></p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
