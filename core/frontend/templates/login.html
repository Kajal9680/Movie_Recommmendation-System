<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - MOVIXPedia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <a href="/" style="text-decoration:none"><span class="logo">MOVIX<span>Pedia</span></span></a>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('main.home') }}">Home</a>
            </nav>
            <div class="actions">
                <a href="{{ url_for('auth.signup') }}" class="signup-link-btn">Sign Up</a>
            </div>
        </header>

        <main class="auth-page">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">🍿</div>
                    <h1>Welcome Back</h1>
                    <p>Log in to your MOVIXPedia account</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Log In</button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
